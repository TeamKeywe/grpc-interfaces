syntax = "proto3";

option java_multiple_files = true;
option java_package = "com.doubleo.patientservice.domain.guardian.grpc.server";
option java_outer_classname = "GuardianServiceProto";

package patient;

message GuardianRequest {
  int64 Guardian_id = 1;
}

message PatientGuardianListRequest {
  int64 patient_id = 1;
}

message CreateGuardianRequest {
  string tenant_id = 1;
  int64 patient_id = 2;
  string guardian_name = 3;
  string guardian_contact = 4;
}

message GuardianResponse {
  int64 guardian_id = 1;
  string tenant_id = 2;
  int64 patient_id = 3;
  string guardian_name = 4;
  string guardian_contact = 5;
}

message PatientGuardianListResponse {
  repeated GuardianResponse guardians = 1;
}

message CreateGuardianResponse {
  int64 guardian_id = 1;
}

service GuardianService {
  rpc GetGuardian (GuardianRequest) returns (GuardianResponse);
  rpc GetPatientGuardianList (PatientGuardianListRequest) returns (PatientGuardianListResponse);
  rpc CreateGuardian (CreateGuardianRequest) returns (CreateGuardianResponse);
}
