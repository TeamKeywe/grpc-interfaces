syntax = "proto3";

option java_multiple_files = true;
option java_package = "com.doubleo.logservice.grpc.server";
option java_outer_classname = "LogServiceProto";

package log;

import "google/protobuf/timestamp.proto";

message CreateEnterLogRequest {
  string tenant_id = 1;
  int64 area_id = 2;
  int64 member_id = 3;
  string member_name = 4;
  int64 pass_id = 5;
  string visit_category = 6;
}

message CreateBuildingEnterLogRequest {
  string tenant_id = 1;
  int64 building_id = 2;
  int64 member_id = 3;
  string member_name = 4;
  int64 pass_id = 5;
  string direction = 6;
  string visit_category = 7;
}

message CreateIssuedLogRequest {
  string tenant_id = 1;
  int64 member_id = 2;
  string member_name = 3;
  string member_contact = 4;
  int64 pass_id = 5;
  google.protobuf.Timestamp start_at = 6;
  google.protobuf.Timestamp expired_at = 7;
  string visit_category = 8;
  repeated string area_codes = 9;
}

message CreateEnterLogResponse {
  int64 enter_log_id = 1;
}

message CreateBuildingEnterLogResponse {
  int64 building_enter_log_id = 1;
}

message CreateIssuedLogResponse {
  int64 issued_log_id = 1;
}

service LogService {
  rpc CreateEnterLog (CreateEnterLogRequest) returns (CreateEnterLogResponse);
  rpc CreateBuildingEnterLog (CreateBuildingEnterLogRequest) returns (CreateBuildingEnterLogResponse);
  rpc CreateIssuedLog (CreateIssuedLogRequest) returns (CreateIssuedLogResponse);
}